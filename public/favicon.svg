<!-- Static render of the app logo (src/components/Logo.jsx) with the dark
     theme colors baked in; strokes are thickened slightly so the lens still
     reads at 16px. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lens" x1="16%" y1="10%" x2="86%" y2="92%">
      <stop offset="0%" stop-color="#78d8d0"/>
      <stop offset="58%" stop-color="#ffd17e"/>
      <stop offset="100%" stop-color="#d987ba"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="27.5" fill="#111b22" stroke="rgba(137, 182, 181, 0.34)" stroke-width="2"/>
  <circle cx="32" cy="32" r="19.8" fill="none" stroke="url(#lens)" stroke-width="2.2" opacity="0.9"/>
  <ellipse cx="32" cy="32" rx="17.9" ry="6.7" fill="none" stroke="#f3b65f" stroke-width="1.6" opacity="0.72"/>
  <ellipse cx="32" cy="32" rx="6.7" ry="17.9" fill="none" stroke="#78d8d0" stroke-width="1.6" opacity="0.58"/>
  <path d="M 7 32 H 20.5 M 43.5 32 H 57 M 32 7 V 20.5 M 32 43.5 V 57" stroke="#98a7a2" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <circle cx="32" cy="32" r="5.3" fill="#07090d" stroke="#ffd17e" stroke-width="2"/>
</svg>
